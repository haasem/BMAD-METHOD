  after_investigate: false
  after_analyze: true
  after_implement: false
  after_qa_pass: true
  before_external_write: true # Always on, cannot be disabled

# Quality gate thresholds
quality_gates:
  analyze:
    max_critical: 0
    max_high: 3
    max_ungrounded: 5
    max_wrong: 0
  qa:
    max_iterations: 3
    max_blockers: 0
    max_high_after_fix: 2

# QA loop history
